services:
  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      # Контейнер доторх зам нь /app/ хавтас дотор байхаар заав
      GOOGLE_APPLICATION_CREDENTIALS: /app/mind-step-key.json
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app  # Энэ мөр таны бүх файлыг (json-г оролцуулаад) контейнер руу хуулна

  # ── Worker ──────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      target: dev
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - GOOGLE_APPLICATION_CREDENTIALS=/app/mind-step-key.json # API-тай ижил болгов
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - .:/app # Энд ч бас бүх файлыг холбож байна
    command: python worker.py
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── RQ Dashboard ────────────────────────────────────────────────────────────
  rq-dashboard:
    image: eoranged/rq-dashboard
    ports:
      - "9181:9181"
    environment:
      RQ_DASHBOARD_REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    profiles:
      - dev
    restart: unless-stopped

volumes:
  redis_data: